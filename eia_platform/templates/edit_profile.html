{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="page-hd"><h1>Edit Profile</h1></div>
<div class="card" style="padding:28px;max-width:520px">
  <form method="POST" enctype="multipart/form-data">
    {% if user.avatar %}
    <div style="text-align:center;margin-bottom:20px">
      <div class="av av-xl" style="margin:0 auto"><img src="{{ url_for('serve_media', filename=user.avatar) }}" alt=""></div>
    </div>
    {% endif %}
    <div class="field"><label>Profile Photo</label>
      <label class="c-chip-file" style="display:inline-flex">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Choose photo</span><input type="file" name="avatar" accept="image/*">
      </label>
    </div>
    <div class="field"><label>Full Name</label><input type="text" name="name" value="{{ user.name }}" required></div>
    <div class="field"><label>Bio</label><textarea name="bio" rows="3" placeholder="Tell your school community about yourself…">{{ user.bio or '' }}</textarea></div>
    <div class="field"><label>Anonymous Name</label>
      <input type="text" name="anon_name" value="{{ anon_name }}" maxlength="20" placeholder="e.g. VoiceOfChange">
      <p style="font-size:12px;color:var(--ink2);margin-top:5px">Shown instead of your real name when you post anonymously. Max 20 characters.</p>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('profile', username=user.username) }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
