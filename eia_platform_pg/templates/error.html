{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="empty-state" style="padding:80px 20px">
  <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <div style="font-family:var(--font-h);font-size:80px;font-weight:800;color:var(--navy);margin:10px 0">{{ code }}</div>
  <h3>{{ msg }}</h3>
  <p style="margin-bottom:24px">{{ 'You do not have permission to view this page.' if code==403 else 'This page could not be found.' }}</p>
  <a href="{{ url_for('feed') }}" class="btn btn-primary">Go to Home</a>
</div>
{% endblock %}
